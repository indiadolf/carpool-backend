<!DOCTYPE html>
<html>
<head>

<title>Road Network</title>

<script src="https://unpkg.com/cytoscape/dist/cytoscape.min.js"></script>

<style>

#cy {
  width: 100%;
  height: 700px;
  border: 1px solid black;
}

</style>

</head>

<body>

<h2>Road Network Graph</h2>

<div id="cy"></div>

<script>

let cy;

fetch("/network/")
.then(res => res.json())
.then(data => {

    cy = cytoscape({
        container: document.getElementById('cy'),

        elements: data,

        style: [
          {
            selector: 'node',
            style: {
              'background-color': '#0074D9',
              'label': 'data(label)',
              'color': 'white'
            }
          },

          {
            selector: '.driver',
            style: {
              'background-color': 'red'
            }
          },

          {
            selector: 'edge',
            style: {
              'width': 3,
              'line-color': '#ccc'
            }
          }
        ],

        layout: {
            name: 'cose'
        }

    });

    updateDrivers();

    setInterval(updateDrivers, 3000);

});


function updateDrivers(){

    fetch("/drivers/")
    .then(res => res.json())
    .then(drivers => {

        cy.nodes().removeClass("driver");

        drivers.forEach(d => {

            let node = cy.getElementById(d.node);

            node.addClass("driver");

        });

    });

}

</script>

</body>
</html>
