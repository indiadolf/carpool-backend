<!DOCTYPE html>
<html>
<head>

<title>Carpool Platform Analytics</title>

<style>

body{
    font-family: Arial;
    margin:40px;
    background:#f4f6f8;
}

h1{
    margin-bottom:40px;
}

.container{
    display:flex;
    flex-wrap:wrap;
}

.card{
    padding:25px;
    margin:20px;
    border-radius:12px;
    width:220px;
    text-align:center;
    background:white;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card h3{
    margin-bottom:10px;
    color:#555;
}

.card p{
    font-size:28px;
    font-weight:bold;
}

.revenue{
    color:green;
}

.trips{
    color:#0074D9;
}

.requests{
    color:#FF851B;
}

.offers{
    color:#B10DC9;
}

</style>

</head>

<body>

<h1>🚗 Carpool Platform Analytics</h1>

<div class="container">

<div class="card">
<h3>Total Trips</h3>
<p class="trips">{{ total_trips }}</p>
</div>

<div class="card">
<h3>Active Trips</h3>
<p class="trips">{{ active_trips }}</p>
</div>

<div class="card">
<h3>Ride Requests</h3>
<p class="requests">{{ total_requests }}</p>
</div>

<div class="card">
<h3>Offers Generated</h3>
<p class="offers">{{ total_offers }}</p>
</div>

<div class="card">
<h3>Total Revenue</h3>
<p class="revenue">₹ {{ revenue }}</p>
</div>

</div>

</body>
</html>
